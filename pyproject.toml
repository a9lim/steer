[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "liahona-ai"
version = "1.1.5"
description = "Local activation steering + trait monitoring TUI for HuggingFace transformers"
readme = "README.md"
license = "AGPL-3.0-or-later"
authors = [{name = "a9lim", email = "mx@a9l.im"}]
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
]
dependencies = [
    "torch>=2.2",
    "transformers>=4.51",
    "accelerate>=0.27",
    "safetensors>=0.4",
    "textual>=0.50",
]

[project.urls]
Homepage = "https://github.com/a9lim/liahona"

[project.optional-dependencies]
bnb = ["bitsandbytes>=0.43"]
flash = ["flash-attn>=2.5"]
cuda = ["bitsandbytes>=0.43", "flash-attn>=2.5"]
dev = ["pytest>=8.0", "httpx>=0.27"]
serve = ["fastapi>=0.110", "uvicorn[standard]>=0.29"]
hf = ["datasets>=2.0"]
pandas = ["pandas>=2.0"]
research = ["datasets>=2.0", "pandas>=2.0"]

[project.scripts]
liahona = "liahona.cli:main"

[tool.setuptools.packages.find]
include = ["liahona*"]

[tool.setuptools.package-data]
liahona = ["probes/defaults.json", "datasets/*.json", "tui/*.tcss"]
