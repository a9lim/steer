[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "liahona"
version = "0.1.0"
description = "Local activation steering + trait monitoring TUI for HuggingFace transformers"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "transformers>=4.40",
    "accelerate>=0.27",
    "safetensors>=0.4",
    "textual>=0.50",
]

[project.optional-dependencies]
bnb = ["bitsandbytes>=0.43"]
flash = ["flash-attn>=2.5"]
cuda = ["bitsandbytes>=0.43", "flash-attn>=2.5"]
dev = ["pytest>=8.0", "httpx>=0.27"]
serve = ["fastapi>=0.110", "uvicorn[standard]>=0.29"]
hf = ["datasets>=2.0"]
pandas = ["pandas>=2.0"]
research = ["datasets>=2.0", "pandas>=2.0"]

[project.scripts]
steer = "liahona.cli:main"

[tool.setuptools.packages.find]
include = ["liahona*"]
