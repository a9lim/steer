name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # Install dev extras so pyright can resolve torch / transformers /
      # safetensors when it analyzes the public API surface.
      - run: pip install -e ".[dev]"
      - run: pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Check version consistency
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib

          pyproject_version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text()
          )["project"]["version"]
          init_text = pathlib.Path("saklas/__init__.py").read_text()
          match = re.search(r'^__version__ = "([^"]+)"', init_text, re.M)
          if match is None:
              raise SystemExit("saklas/__init__.py has no __version__")
          init_version = match.group(1)
          if pyproject_version != init_version:
              raise SystemExit(
                  f"version mismatch: pyproject={pyproject_version}, "
                  f"__version__={init_version}"
              )
          PY
      - run: pytest -q -m "not gpu"
